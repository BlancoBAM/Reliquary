name: Build & Release Reliquary

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    name: Build .deb (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ── System deps (webkit2gtk-4.0 is the Tauri v1 requirement) ─────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup2.4-dev

      # ── Node ─────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      # ── Rust ─────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Frontend build (Next.js static export) ────────────────────────────
      - name: Build Next.js frontend
        run: npm run build

      # ── Tauri .deb build ──────────────────────────────────────────────────
      - name: Build Tauri .deb package
        run: npm run tauri -- build --bundles deb
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || '' }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}

      # ── Upload .deb as release asset ─────────────────────────────────────
      - name: Upload .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Reliquary ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: src-tauri/target/release/bundle/deb/*.deb
          body: |
            ## 🔥 Reliquary ${{ github.ref_name }}

            Default file manager for **Lilith Linux** — dark, fast, and intelligent.

            ### Install

            ```bash
            sudo dpkg -i reliquary_*.deb
            # or
            sudo apt install ./reliquary_*.deb
            ```

            ### Set as default file manager

            ```bash
            xdg-mime default reliquary.desktop inode/directory
            ```

            ### Features
            - Drag-and-drop file moving
            - Undo (Ctrl+Z) for moves, renames, copies, and creates
            - Rename & Delete (Trash / Permanent) from right-click menu
            - Delete key trashes selection; Shift+Delete permanently removes
            - Lilim AI integration for file-content semantic search
            - Full Lilith Linux Infernal Dark theme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
